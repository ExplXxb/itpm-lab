name: Add PR to Project

on:
  pull_request:
    types: [opened]

jobs:
  add-pr-to-project:
    runs-on: ubuntu-latest

    steps:
      # Додаємо PR у Project
      - name: Add PR to project
        id: add_to_project
        uses: actions/add-to-project@v0.6.1
        with:
          project-url: https://github.com/users/ExplXxb/projects/4
          github-token: ${{ secrets.PROJECT_TOKEN }}

      # Оновлюємо поля Type та Status
      - name: Update Project Fields
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const projectItemId = "${{ steps.add_to_project.outputs.itemId }}";

            // Отримати projectId та поля Project
            const fieldsQuery = `
              query($org: String!, $projectNumber: Int!) {
                user(login: $org) {
                  projectV2(number: $projectNumber) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2FieldCommon {
                          id
                          name
                        }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }`;

            const result = await github.graphql(fieldsQuery, {
              org: "ExplXxb",
              projectNumber: 4
            });

            const projectId = result.user.projectV2.id;
            const fields = result.user.projectV2.fields.nodes;

            function getFieldId(name) {
              const field = fields.find(f => f.name === name);
              if (!field) throw new Error(`Field "${name}" not found in project`);
              return field.id;
            }

            function getOptionId(fieldName, optionName) {
              const field = fields.find(f => f.name === fieldName);
              if (!field) throw new Error(`Field "${fieldName}" not found in project`);
              const option = field.options.find(o => o.name === optionName);
              if (!option) throw new Error(`Option "${optionName}" not found in field "${fieldName}"`);
              return option.id;
            }

            const typeFieldId = getFieldId("Type");
            const statusFieldId = getFieldId("Status");
            const featureId = getOptionId("Type", "Feature");
            const inProgressId = getOptionId("Status", "In Progress");

            // Оновлюємо поля через GraphQL
            const mutation = `
              mutation($projectId: ID!, $projectItemId: ID!, $typeFieldId: ID!, $featureId: String!, $statusFieldId: ID!, $inProgressId: String!) {
                setType: updateProjectV2ItemFieldValue(
                  input: {projectId: $projectId, itemId: $projectItemId, fieldId: $typeFieldId, value: {singleSelectOptionId: $featureId}}
                ) { clientMutationId }

                setStatus: updateProjectV2ItemFieldValue(
                  input: {projectId: $projectId, itemId: $projectItemId, fieldId: $statusFieldId, value: {singleSelectOptionId: $inProgressId}}
                ) { clientMutationId }
              }
            `;

            await github.graphql(mutation, {
              projectId,
              projectItemId,
              typeFieldId,
              featureId,
              statusFieldId,
              inProgressId
            });
